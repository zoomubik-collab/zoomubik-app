# Fix Info.plist step
- name: Fix Info.plist
  script: |-
    cd ios/App
    /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.0.1" App/Info.plist
    # Set the current version
    /usr/libexec/PlistBuddy -c "Set :MARKETING_VERSION 1.0.1" ios/App/App.xcodeproj/project.pbxproj
    /usr/libexec/PlistBuddy -c "Set :CURRENT_PROJECT_VERSION 100" ios/App/App.xcodeproj/project.pbxproj

# Set iOS version/build step
- name: Set iOS version/build
  script: |-
    cd ios/App
    /usr/libexec/PlistBuddy -c "Set :MARKETING_VERSION 1.0.1" App.xcodeproj/project.pbxproj
    /usr/libexec/PlistBuddy -c "Set :CURRENT_PROJECT_VERSION 100" App.xcodeproj/project.pbxproj

